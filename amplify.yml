version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
        - npm run install-client
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: client/build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - client/node_modules/**/*
backend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - echo "Backend build complete"
  runtime:
    name: nodejs
customRules:
  - source: /api/<*>
    destination: /server.js
    status: 200
  - source: <*>
    destination: /index.html
    status: 200
