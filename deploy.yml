# Universal Deployment Configuration

## Vercel (Current)
- vercel.json configured
- Automatic deployment on git push
- URL: https://luckys-appologies-n2lr53on4-luckys-projects-56cb8b9b.vercel.app/

## Netlify
1. Connect your GitHub repository to Netlify
2. Set build command: `npm run build`
3. Set publish directory: `client/build`
4. Add redirect rule in `_redirects` file:
   ```
   /api/* /.netlify/functions/server 200
   /* /index.html 200
   ```

## Heroku
1. Create a `Procfile`:
   ```
   web: npm start
   ```
2. Set buildpacks:
   - heroku/nodejs
   - heroku/react-static
3. Deploy: `git push heroku main`

## AWS Amplify
1. Connect GitHub repository
2. Set build settings:
   - Build command: `npm run build`
   - Base directory: `/`
   - Publish directory: `client/build`
3. Add redirects in `amplify.yml`:
   ```yaml
   customRedirects:
     - source: /api/<*>
       destination: /server.js
       status: 200
     - source: <*>
       destination: /index.html
       status: 200
   ```

## DigitalOcean App Platform
1. Connect GitHub repository
2. Set build command: `npm run build`
3. Set output directory: `client/build`
4. Set run command: `npm start`

## Railway
1. Connect GitHub repository
2. Railway will auto-detect Node.js
3. Set build command: `npm run build`
4. Set start command: `npm start`

## Render
1. Connect GitHub repository
2. Select "Web Service"
3. Set build command: `npm run build`
4. Set publish directory: `client/build`
5. Set start command: `npm start`

## Firebase Hosting
1. Install Firebase CLI: `npm i -g firebase-tools`
2. Initialize: `firebase init hosting`
3. Set public directory: `client/build`
4. Configure rewrites in `firebase.json`:
   ```json
   {
     "hosting": {
       "public": "client/build",
       "rewrites": [
         { "source": "/api/**", "destination": "/server.js" },
         { "source": "**", "destination": "/index.html" }
       ]
     }
   }
   ```
5. Deploy: `firebase deploy`

## GitHub Pages (Static Only)
1. Add `homepage` to client/package.json:
   `"homepage": "https://yourusername.github.io/reponame"`
2. Build: `npm run build`
3. Deploy `client/build` folder to gh-pages branch
